<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#7c3aed">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>Student Login — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="center-wrapper">
    <div class="glass-card large-card">
        <h2 style="font-size:26px; margin-bottom:6px; color:#7c3aed;">✨ Student Login</h2>
        <p class="subtitle" style="font-size:13px; color:#a78bca; margin-bottom:22px;">Welcome back to Event Bliss 💖</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-message" style="margin-bottom:14px;">
            {% for msg in messages %}<p style="margin:0;">{{ msg }}</p>{% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% if error %}
        <div class="error-msg" style="margin-bottom:12px;">{{ error }}</div>
        {% endif %}

        <form method="POST" autocomplete="off" data-form-type="other" id="login-form">
            <label>Username or Email <span style="color:#e07aad;">*</span></label>
            <div style="position:relative; margin-bottom:15px;">
                <input type="text" id="username-input" name="username" placeholder="Your username or email" required autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" data-form-type="other" style="margin-bottom:0;" oninput="showSuggestions(this.value)" onblur="hideSuggestions()">
                <div id="suggestions-box" style="display:none; position:absolute; top:100%; left:0; right:0; background:#fff; border:1.5px solid #cbb4f4; border-radius:12px; z-index:100; overflow:hidden; box-shadow:0 4px 14px rgba(124,58,237,0.1);"></div>
            </div>

            <label>Password <span style="color:#e07aad;">*</span></label>
            <div style="position:relative; margin-bottom:15px;">
                <input type="text" id="pw-login" name="password" placeholder="Your password" required autocomplete="off" data-form-type="other" class="masked-pw" style="padding-right:42px; margin-bottom:0; width:calc(100% - 32px);">
                <button type="button" onclick="togglePw('pw-login',this)" tabindex="-1" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9d82c0;font-size:16px;line-height:1;padding:0;">👁</button>
            </div>

            <button type="submit" class="primary-btn" style="width:100%; margin-top:8px;">Login 🌸</button>
        </form>

        <div class="forgot">
            <a href="/forgot_password">Forgot Password?</a>
        </div>

        <div style="text-align:center; margin:16px 0 10px; opacity:0.5; font-size:13px;">— or —</div>

        <a href="/google_login" style="
            display:block; text-align:center; padding:11px 16px;
            border-radius:20px;
            background:linear-gradient(135deg,#fde8f5,#ede0ff);
            color:#6d28d9; font-size:14px; font-weight:500;
            text-decoration:none;
            border:1.5px solid #cbb4f4;
            transition:0.3s ease;
        " onmouseover="this.style.boxShadow='0 4px 14px rgba(203,180,244,0.5)'"
           onmouseout="this.style.boxShadow='none'">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                 width="16" style="vertical-align:middle; margin-right:8px;">
            Continue with Google
        </a>

        <div style="text-align:center; margin-top:18px;">
            <a href="/" class="btn-back">← Back to Home</a>
        </div>
    </div>
</div>
<style>
.masked-pw { -webkit-text-security: disc; text-security: disc; }
</style>
<script>
function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.classList.contains('masked-pw')) {
        inp.classList.remove('masked-pw');
        btn.textContent = '🙈';
    } else {
        inp.classList.add('masked-pw');
        btn.textContent = '👁';
    }
}

// Save username to localStorage on submit
document.getElementById('login-form').addEventListener('submit', function() {
    const username = document.getElementById('username-input').value.trim();
    if (!username) return;
    let saved = JSON.parse(localStorage.getItem('eb_usernames') || '[]');
    if (!saved.includes(username)) {
        saved.unshift(username);
        if (saved.length > 5) saved = saved.slice(0, 5);
        localStorage.setItem('eb_usernames', JSON.stringify(saved));
    }
});

function showSuggestions(val) {
    const box = document.getElementById('suggestions-box');
    let saved = JSON.parse(localStorage.getItem('eb_usernames') || '[]');
    const matches = val
        ? saved.filter(u => u.toLowerCase().startsWith(val.toLowerCase()))
        : saved;
    if (!matches.length) { box.style.display = 'none'; return; }
    box.innerHTML = matches.map(u =>
        `<div onmousedown="selectUsername('${u}')" style="padding:10px 16px; cursor:pointer; font-size:13px; color:#4b2d8f;"
              onmouseover="this.style.background='#f3eeff'" onmouseout="this.style.background='#fff'">${u}</div>`
    ).join('');
    box.style.display = 'block';
}

function hideSuggestions() {
    setTimeout(() => { document.getElementById('suggestions-box').style.display = 'none'; }, 150);
}

function selectUsername(u) {
    document.getElementById('username-input').value = u;
    document.getElementById('suggestions-box').style.display = 'none';
    document.getElementById('pw-login').focus();
}
</script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
}
</script>
</body>
</html>
