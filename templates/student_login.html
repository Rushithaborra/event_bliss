<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="login-card">

<h2>✨ Student Login ✨</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="flash-message">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

</form>

<br>

<a href="/forgot_password">Forgot Password?</a>

<br><br>

<div style="text-align:center; margin: 10px 0; opacity: 0.5; font-size: 13px;">— or —</div>

<a href="/google_login" style="
    display: block;
    text-align: center;
    padding: 11px;
    border-radius: 20px;
    background: linear-gradient(135deg, #fff1f1, #e8f0fe);
    color: #444;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid #ddd;
    transition: 0.3s ease;
" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.12)'" onmouseout="this.style.boxShadow='none'">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" style="vertical-align:middle; margin-right:8px;">
    Continue with Google
</a>

<br>

<a href="/">Back</a>

</div>

</body>
</html>
