<!DOCTYPE html>
<html>
<head>
    <title>Student Login — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="center-wrapper">
    <div class="glass-card large-card">
        <h2 style="font-size:26px; margin-bottom:6px; color:#7c3aed;">✨ Student Login</h2>
        <p class="subtitle" style="font-size:13px; color:#a78bca; margin-bottom:22px;">Welcome back to Event Bliss 💖</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-message" style="margin-bottom:14px;">
            {% for msg in messages %}<p style="margin:0;">{{ msg }}</p>{% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% if error %}
        <div class="error-msg" style="margin-bottom:12px;">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>Username or Email <span style="color:#e07aad;">*</span></label>
            <input type="text" name="username" placeholder="Your username or email" required>

            <label>Password <span style="color:#e07aad;">*</span></label>
            <div style="position:relative; margin-bottom:15px;">
                <input type="password" id="pw-login" name="password" placeholder="Your password" required style="padding-right:42px; margin-bottom:0;">
                <button type="button" onclick="togglePw('pw-login',this)" tabindex="-1" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9d82c0;font-size:16px;line-height:1;padding:0;">👁</button>
            </div>

            <button type="submit" class="primary-btn" style="width:100%; margin-top:8px;">Login 🌸</button>
        </form>

        <div class="forgot">
            <a href="/forgot_password">Forgot Password?</a>
        </div>

        <div style="text-align:center; margin:16px 0 10px; opacity:0.5; font-size:13px;">— or —</div>

        <a href="/google_login" style="
            display:block; text-align:center; padding:11px 16px;
            border-radius:20px;
            background:linear-gradient(135deg,#fde8f5,#ede0ff);
            color:#6d28d9; font-size:14px; font-weight:500;
            text-decoration:none;
            border:1.5px solid #cbb4f4;
            transition:0.3s ease;
        " onmouseover="this.style.boxShadow='0 4px 14px rgba(203,180,244,0.5)'"
           onmouseout="this.style.boxShadow='none'">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                 width="16" style="vertical-align:middle; margin-right:8px;">
            Continue with Google
        </a>

        <div style="text-align:center; margin-top:18px;">
            <a href="/" class="btn-back">← Back to Home</a>
        </div>
    </div>
</div>
<script>
function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
}
</script>
</body>
</html>
