<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#7c3aed">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>Verify Admin OTP — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="center-wrapper">
    <div class="glass-card large-card">
        <h2 style="font-size:24px; margin-bottom:6px; color:#7c3aed;">📧 Enter Admin OTP</h2>
        <p class="subtitle" style="font-size:13px; color:#a78bca; margin-bottom:8px;">
            A 6-digit OTP was sent to <strong>{{ email }}</strong>
        </p>
        <p style="font-size:12px; color:#b59fd4; margin-bottom:20px;">Check your inbox and enter the code below.</p>

        {% if error %}
        <div class="error-msg" style="margin-bottom:12px;">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>6-Digit OTP</label>
            <input type="text" name="otp" placeholder="Enter OTP" maxlength="6"
                   style="letter-spacing:6px; font-size:20px; font-weight:700; text-align:center;" autofocus required>

            <button type="submit" class="primary-btn" style="width:100%; margin-top:12px;">Verify & Login →</button>
        </form>

        <div style="text-align:center; margin-top:16px;">
            <a href="/admin_login" class="btn-back">← Back to Login</a>
        </div>
    </div>
</div>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
}
</script>
</body>
</html>
