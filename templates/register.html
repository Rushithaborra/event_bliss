<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#7c3aed">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>Register — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="center-wrapper">
    <div class="glass-card large-card">
        <h2 style="font-size:26px; margin-bottom:6px; color:#7c3aed;">✨ Create Account</h2>
        <p class="subtitle" style="font-size:13px; color:#a78bca; margin-bottom:22px;">Join Event Bliss as a student</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% if "already exists" in error %}
        <div style="text-align:center; margin-bottom:14px;">
            <a href="/student_login" class="primary-btn" style="display:inline-block; padding:10px 28px; text-decoration:none;">Login Instead →</a>
        </div>
        {% endif %}
        {% endif %}

        <form method="POST" autocomplete="off">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Your full name" required autocomplete="off">

            <label>Username <span style="color:#e07aad;">*</span></label>
            <input type="text" name="username" placeholder="Choose a unique username" required autocomplete="off">

            <label>Email</label>
            <input type="email" name="email" placeholder="you@example.com" required autocomplete="off">

            <label>Password</label>
            <div style="position:relative; margin-bottom:6px;">
                <input type="password" id="pw-reg" name="password" placeholder="Create a password" required autocomplete="new-password" style="padding-right:42px; margin-bottom:0; width:calc(100% - 32px);" oninput="checkRules('pw-reg','rules-reg')">
                <button type="button" onclick="togglePw('pw-reg',this)" tabindex="-1" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9d82c0;font-size:16px;line-height:1;padding:0;">👁</button>
            </div>
            <div id="rules-reg" style="font-size:11.5px; margin:0 0 14px 2px; line-height:2; display:none;">
                <span data-rule="len"   style="color:#bbb; margin-right:14px;">✗ 8+ chars</span>
                <span data-rule="upper" style="color:#bbb; margin-right:14px;">✗ Uppercase</span>
                <span data-rule="lower" style="color:#bbb; margin-right:14px;">✗ Lowercase</span>
                <span data-rule="num"   style="color:#bbb; margin-right:14px;">✗ Number</span>
                <span data-rule="spec"  style="color:#bbb;">✗ Special (!@#…)</span>
            </div>

            <button type="submit" class="primary-btn" style="width:100%; margin-top:8px;">Register 🎉</button>
        </form>

        <div style="text-align:center; margin-top:18px;">
            <a href="/" class="btn-back">← Back to Home</a>
        </div>
    </div>
</div>
<script>
function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
}
const PW_CHECKS = {
    len:   v => v.length >= 8,
    upper: v => /[A-Z]/.test(v),
    lower: v => /[a-z]/.test(v),
    num:   v => /[0-9]/.test(v),
    spec:  v => /[!@#$%^&*()\-_=+\[\]{};':",.<>?/\\|`~]/.test(v)
};
const PW_LABELS = { len:'8+ chars', upper:'Uppercase', lower:'Lowercase', num:'Number', spec:'Special (!@#…)' };
function checkRules(inputId, rulesId) {
    const v = document.getElementById(inputId).value;
    const box = document.getElementById(rulesId);
    box.style.display = v.length ? 'block' : 'none';
    box.querySelectorAll('[data-rule]').forEach(el => {
        const ok = PW_CHECKS[el.dataset.rule](v);
        el.style.color = ok ? '#7c3aed' : '#bbb';
        el.textContent = (ok ? '✓ ' : '✗ ') + PW_LABELS[el.dataset.rule];
    });
}
function pwValid(inputId) {
    const v = document.getElementById(inputId).value;
    return Object.values(PW_CHECKS).every(fn => fn(v));
}
document.querySelector('form').addEventListener('submit', function(e) {
    if (!pwValid('pw-reg')) {
        e.preventDefault();
        document.getElementById('rules-reg').style.display = 'block';
        document.getElementById('pw-reg').focus();
    }
});
</script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
}
</script>
</body>
</html>
