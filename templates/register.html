<!DOCTYPE html>
<html>
<head>
    <title>Register — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="center-wrapper">
    <div class="glass-card large-card">
        <h2 style="font-size:26px; margin-bottom:6px; color:#7c3aed;">✨ Create Account</h2>
        <p class="subtitle" style="font-size:13px; color:#a78bca; margin-bottom:22px;">Join Event Bliss as a student</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% if "already exists" in error %}
        <div style="text-align:center; margin-bottom:14px;">
            <a href="/student_login" class="primary-btn" style="display:inline-block; padding:10px 28px; text-decoration:none;">Login Instead →</a>
        </div>
        {% endif %}
        {% endif %}

        <form method="POST">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Your full name" required>

            <label>Username <span style="color:#e07aad;">*</span></label>
            <input type="text" name="username" placeholder="Choose a unique username" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="you@example.com" required>

            <label>Password</label>
            <div style="position:relative; margin-bottom:15px;">
                <input type="password" id="pw-reg" name="password" placeholder="Create a password" required style="padding-right:42px; margin-bottom:0;">
                <button type="button" onclick="togglePw('pw-reg',this)" tabindex="-1" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9d82c0;font-size:16px;line-height:1;padding:0;">👁</button>
            </div>

            <button type="submit" class="primary-btn" style="width:100%; margin-top:8px;">Register 🎉</button>
        </form>

        <div style="text-align:center; margin-top:18px;">
            <a href="/" class="btn-back">← Back to Home</a>
        </div>
    </div>
</div>
<script>
function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
}
</script>
</body>
</html>
