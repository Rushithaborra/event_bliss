<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="center-wrapper">
    <div class="glass-card large-card">
        <h2 style="font-size:26px; margin-bottom:6px; color:#7c3aed;">🔑 Forgot Password</h2>
        <p class="subtitle" style="font-size:13px; color:#a78bca; margin-bottom:22px;">
            Enter your email — we'll send a reset link
        </p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-message">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST" autocomplete="off" data-form-type="other">
            <label>Email</label>
            <input type="email" name="email" placeholder="your-email@example.com" required autocomplete="off" data-form-type="other">

            <button type="submit" class="primary-btn" style="width:100%; margin-top:8px;">Send Reset Link →</button>
        </form>

        <div style="text-align:center; margin-top:18px;">
            <a href="/student_login" class="btn-back">← Back to Login</a>
        </div>
    </div>
</div>
</body>
</html>
