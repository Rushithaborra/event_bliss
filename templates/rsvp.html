<!DOCTYPE html>
<html>
<head>
    <title>RSVP — {{ event[1] }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="container">

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="success-popup">{{ messages[0] }}</div>
    {% endif %}
    {% endwith %}

    <div class="card">
        <h2>💌 {{ event[1] }}</h2>
        <p>
            📅 {{ event[2] }} &nbsp; 🕐 {{ event[3] }}<br>
            📍 {{ event[4] }}<br>
            {% if event[5] %}🎯 Organiser: {{ event[5] }}{% endif %}
        </p>
        <hr>

        <h3>RSVP for this Event</h3>
        <form method="POST">
            <label>Your Name:</label>
            <input type="text" name="name" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Phone (optional):</label>
            <input type="text" name="phone">

            <label>Will you attend?</label>
            <select name="status" style="width:100%; padding:10px; border-radius:12px; border:1px solid #E8A0BF; margin-bottom:15px;">
                <option value="attending">✅ Yes, I'll be there!</option>
                <option value="not_attending">❌ Sorry, I can't make it</option>
            </select>

            <button type="submit">Submit RSVP 💖</button>
        </form>
    </div>

</div>
</body>
</html>
