<!DOCTYPE html>
<html>
<head>
    <title>Edit Venue — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="center-wrapper">
    <div class="glass-card large-card">
        <h2 style="font-size:26px; margin-bottom:6px; color:#7c3aed;">🏛 Edit Venue</h2>
        <p class="subtitle" style="font-size:13px; color:#a78bca; margin-bottom:22px;">Update venue details</p>

        <form method="POST">
            <label>Venue Name</label>
            <input type="text" name="venue_name" value="{{ venue[1] }}" required>

            <label>Location</label>
            <input type="text" name="location" value="{{ venue[2] or '' }}">

            <label>Capacity</label>
            <input type="number" name="capacity" value="{{ venue[3] or '' }}">

            <button type="submit" class="primary-btn" style="width:100%; margin-top:8px;">Save Changes 💖</button>
        </form>

        <div style="text-align:center; margin-top:18px;">
            <a href="/venues" class="btn-back">← Back to Venues</a>
        </div>
    </div>
</div>
</body>
</html>
