<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#7c3aed">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>Discussion — {{ event.event_name }} — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .chat-card {
            display: flex;
            flex-direction: column;
            height: 65vh;
            padding: 0;
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .chat-msg {
            background: rgba(255,255,255,0.6);
            border: 1px solid #f0e6ff;
            border-radius: 14px;
            padding: 10px 14px;
            max-width: 80%;
        }
        .chat-msg-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .chat-msg-time {
            font-size: 11px;
            color: #b59fd4;
        }
        .chat-msg-body {
            font-size: 14px;
            color: #4a2e6e;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .chat-msg-delete {
            background: none; border: none; color: #e07aad; font-size: 11px;
            cursor: pointer; opacity: 0.7;
        }
        .chat-msg-delete:hover { opacity: 1; }
        .chat-input-row {
            display: flex;
            gap: 10px;
            padding: 14px 20px;
            border-top: 1px solid #f0e6ff;
            background: rgba(255,255,255,0.4);
        }
        .chat-input-row textarea {
            flex: 1;
            resize: none;
            min-height: 42px;
            max-height: 100px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            margin: 0;
        }
        .chat-empty {
            text-align: center;
            color: #b59fd4;
            padding: 40px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="container" style="max-width:700px;">
    <h2>💬 {{ event.event_name }} — Discussion Room</h2>
    <p style="font-size:13px; color:#9d82c0; margin-top:-10px;">Only registered students and admins can see and post here.</p>

    <div class="card chat-card">
        <div class="chat-messages" id="chat-messages">
            <p class="chat-empty" id="chat-empty">No messages yet — start the conversation! 🌸</p>
        </div>
        <div class="chat-input-row">
            <textarea id="chat-input" placeholder="Type a message..." maxlength="2000"></textarea>
            <button class="primary-btn" id="chat-send-btn" onclick="sendMessage()">Send 🌸</button>
        </div>
    </div>

    <div class="card-top">
        <a href="{{ url_for('my_events') }}" class="btn-back">← Back to My Events</a>
    </div>
</div>

<script>
const EVENT_ID = {{ event.event_id }};
const IS_ADMIN = {{ 'true' if is_admin else 'false' }};
let lastMessageId = 0;
let pollTimer = null;

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function renderMessage(m) {
    const wrap = document.createElement('div');
    wrap.className = 'chat-msg';
    wrap.dataset.id = m.message_id;

    let avatar;
    if (m.author.profile_pic) {
        avatar = `<img src="/static/uploads/profile_pics/${encodeURIComponent(m.author.profile_pic)}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;">`;
    } else {
        const initials = (m.author.name || '??').slice(0, 2).toUpperCase();
        avatar = `<span style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#f5b8dc,#c084fc);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;">${initials}</span>`;
    }

    const socials = [];
    if (m.author.github_url) socials.push(`<a href="${m.author.github_url}" target="_blank" rel="noopener" title="GitHub" style="text-decoration:none;color:#181717;"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23a11.5 11.5 0 013.003-.404c1.02.005 2.047.138 3.006.404 2.29-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.606-.014 2.898-.014 3.293 0 .322.216.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg></a>`);
    if (m.author.linkedin_url) socials.push(`<a href="${m.author.linkedin_url}" target="_blank" rel="noopener" title="LinkedIn" style="text-decoration:none;color:#0A66C2;"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 11-.001-4.125 2.062 2.062 0 010 4.125zM7.119 20.452H3.554V9h3.565v11.452z"/></svg></a>`);
    if (m.author.portfolio_url) socials.push(`<a href="${m.author.portfolio_url}" target="_blank" rel="noopener" title="Portfolio" style="text-decoration:none;">🌐</a>`);
    if (m.author.instagram_url) socials.push(`<a href="${m.author.instagram_url}" target="_blank" rel="noopener" title="Instagram" style="text-decoration:none;color:#E4405F;"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zm0 10.162a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>`);

    const adminBadge = m.author.is_admin ? '<span style="background:#7c3aed;color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;margin-left:4px;font-weight:600;">ADMIN</span>' : '';
    const deleteBtn = m.can_delete ? `<button class="chat-msg-delete" onclick="deleteMessage(${m.message_id})">🗑</button>` : '';

    wrap.innerHTML = `
        <div class="chat-msg-header">
            <span style="display:flex;align-items:center;gap:8px;">
                ${avatar}
                <span style="font-weight:600;color:#7c3aed;font-size:13px;">${escapeHtml(m.author.name)}${adminBadge}</span>
                <span style="display:inline-flex;gap:5px;font-size:13px;">${socials.join('')}</span>
            </span>
            <span style="display:flex;align-items:center;gap:8px;">
                <span class="chat-msg-time">${m.created_at}</span>
                ${deleteBtn}
            </span>
        </div>
        <div class="chat-msg-body">${escapeHtml(m.message)}</div>
    `;
    return wrap;
}

async function pollMessages() {
    try {
        const res = await fetch(`/event/${EVENT_ID}/discussion/messages?after=${lastMessageId}`);
        const data = await res.json();
        if (!data.ok || !data.messages.length) return;
        const container = document.getElementById('chat-messages');
        const empty = document.getElementById('chat-empty');
        if (empty) empty.remove();
        const wasNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
        data.messages.forEach(m => {
            container.appendChild(renderMessage(m));
            lastMessageId = Math.max(lastMessageId, m.message_id);
        });
        if (wasNearBottom) container.scrollTop = container.scrollHeight;
    } catch (e) {
        console.error('poll failed', e);
    }
}

async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    const btn = document.getElementById('chat-send-btn');
    btn.disabled = true;
    try {
        const res = await fetch(`/event/${EVENT_ID}/discussion/send`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text})
        });
        const data = await res.json();
        if (data.ok) {
            input.value = '';
            await pollMessages();
        } else {
            alert(data.error || 'Could not send message.');
        }
    } finally {
        btn.disabled = false;
    }
}

async function deleteMessage(messageId) {
    if (!confirm('Delete this message?')) return;
    const res = await fetch(`/event/${EVENT_ID}/discussion/delete/${messageId}`, {method: 'POST'});
    const data = await res.json();
    if (data.ok) {
        const el = document.querySelector(`.chat-msg[data-id="${messageId}"]`);
        if (el) el.remove();
    }
}

document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

pollMessages();
pollTimer = setInterval(pollMessages, 4000);
window.addEventListener('beforeunload', () => clearInterval(pollTimer));
</script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js');
}
</script>
</body>
</html>
