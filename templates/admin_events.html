<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head> 


<div class="container">

<h2>💌All Events</h2>

<div class="card">

<table>
    <tr>
    <th>Event Name</th>
    <th>Date</th>
    <th>Venue</th>
    <th>Seats</th>
    <th>Action</th>
</tr>

{% for event in events %}
<tr>
    <td>{{ event[1] }}</td>
    <td>{{ event[2] }}</td>
    <td>{{ event[3] }}</td>
    <td>{{ event[4] }}</td>
    <td>
        <a href="/admin/event/{{ event[0] }}">View Registrations</a> | 
        <a href="/edit_event/{{ event[0] }}">Edit</a> |
        <a href="/delete_event/{{ event[0] }}">Delete</a>
    </td>
</tr>
{% endfor %}
</table>

</div>
</div>

<br>
<div class="card-top">
    <a href="{{ url_for('admin_dashboard') }}" class="btn-back">← Back to Dashboard</a>
</div>
