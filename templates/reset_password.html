<!DOCTYPE html>
<html>
<head>
    <title>Reset Password — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="center-wrapper">
    <div class="glass-card large-card">
        <h2 style="font-size:26px; margin-bottom:6px; color:#7c3aed;">🔐 Reset Password</h2>
        <p class="subtitle" style="font-size:13px; color:#a78bca; margin-bottom:22px;">
            Choose a strong new password
        </p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-message">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <label>New Password</label>
            <input type="password" name="password" placeholder="New password" required>

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>

            <button type="submit" class="primary-btn" style="width:100%; margin-top:8px;">Update Password 💖</button>
        </form>

        <div style="text-align:center; margin-top:18px;">
            <a href="/student_login" class="btn-back">← Back to Login</a>
        </div>
    </div>
</div>
</body>
</html>
