<!DOCTYPE html>
<html>
<head>
    <title>Reset Password — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="center-wrapper">
    <div class="glass-card large-card">
        <h2 style="font-size:26px; margin-bottom:6px; color:#7c3aed;">🔐 Reset Password</h2>
        <p class="subtitle" style="font-size:13px; color:#a78bca; margin-bottom:22px;">
            Choose a strong new password
        </p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-message">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <label>New Password</label>
            <div style="position:relative; margin-bottom:6px;">
                <input type="password" id="pw-new" name="password" placeholder="New password" required style="padding-right:42px; margin-bottom:0; width:calc(100% - 32px);" oninput="checkRules('pw-new','rules-new')">
                <button type="button" onclick="togglePw('pw-new',this)" tabindex="-1" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9d82c0;font-size:16px;line-height:1;padding:0;">👁</button>
            </div>
            <div id="rules-new" style="font-size:11.5px; margin:0 0 14px 2px; line-height:2; display:none;">
                <span data-rule="len"   style="color:#bbb; margin-right:14px;">✗ 8+ chars</span>
                <span data-rule="upper" style="color:#bbb; margin-right:14px;">✗ Uppercase</span>
                <span data-rule="lower" style="color:#bbb; margin-right:14px;">✗ Lowercase</span>
                <span data-rule="num"   style="color:#bbb; margin-right:14px;">✗ Number</span>
                <span data-rule="spec"  style="color:#bbb;">✗ Special (!@#…)</span>
            </div>

            <label>Confirm Password</label>
            <div style="position:relative; margin-bottom:15px;">
                <input type="password" id="pw-confirm" name="confirm_password" placeholder="Confirm new password" required style="padding-right:42px; margin-bottom:0; width:calc(100% - 32px);">
                <button type="button" onclick="togglePw('pw-confirm',this)" tabindex="-1" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9d82c0;font-size:16px;line-height:1;padding:0;">👁</button>
            </div>

            <button type="submit" class="primary-btn" style="width:100%; margin-top:8px;">Update Password 💖</button>
        </form>

        <div style="text-align:center; margin-top:18px;">
            <a href="/student_login" class="btn-back">← Back to Login</a>
        </div>
    </div>
</div>
<script>
function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
}
const PW_CHECKS = {
    len:   v => v.length >= 8,
    upper: v => /[A-Z]/.test(v),
    lower: v => /[a-z]/.test(v),
    num:   v => /[0-9]/.test(v),
    spec:  v => /[!@#$%^&*()\-_=+\[\]{};':",.<>?/\\|`~]/.test(v)
};
const PW_LABELS = { len:'8+ chars', upper:'Uppercase', lower:'Lowercase', num:'Number', spec:'Special (!@#…)' };
function checkRules(inputId, rulesId) {
    const v = document.getElementById(inputId).value;
    const box = document.getElementById(rulesId);
    box.style.display = v.length ? 'block' : 'none';
    box.querySelectorAll('[data-rule]').forEach(el => {
        const ok = PW_CHECKS[el.dataset.rule](v);
        el.style.color = ok ? '#7c3aed' : '#bbb';
        el.textContent = (ok ? '✓ ' : '✗ ') + PW_LABELS[el.dataset.rule];
    });
}
function pwValid(inputId) {
    const v = document.getElementById(inputId).value;
    return Object.values(PW_CHECKS).every(fn => fn(v));
}
document.querySelector('form').addEventListener('submit', function(e) {
    if (!pwValid('pw-new')) {
        e.preventDefault();
        document.getElementById('rules-new').style.display = 'block';
        document.getElementById('pw-new').focus();
    }
});
</script>
</body>
</html>
