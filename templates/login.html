

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <script>
        function toggleFields() {
            var role = document.getElementById("role").value;

            if (role === "student") {
                document.getElementById("student_fields").style.display = "block";
                document.getElementById("admin_fields").style.display = "none";
            } 
            else if (role === "admin") {
                document.getElementById("student_fields").style.display = "none";
                document.getElementById("admin_fields").style.display = "block";
            }
        }
    </script>
</head>

<body>

<div class="center-wrapper">
    <div class="glass-card">

        <h2>✨ Login ✨</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error-box">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="role" value="{{ role }}">

            {% if role == "student" %}
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>

            {% elif role == "admin" %}
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
            {% endif %}

            <button type="submit" class="primary-btn">Login 🌸</button>
        </form>

        <a href="/select_role" class="back-link">← Back</a>

    </div>
</div>

</body>
</html>
