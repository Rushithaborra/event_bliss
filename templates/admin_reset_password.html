<!DOCTYPE html>
<html>
<head>
    <title>Admin Reset Password — Event Bliss</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="center-wrapper">
    <div class="glass-card large-card">
        <h2 style="font-size:26px; margin-bottom:6px; color:#7c3aed;">🔐 Reset Admin Password</h2>
        <p class="subtitle" style="font-size:13px; color:#a78bca; margin-bottom:22px;">
            Choose a strong new password
        </p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-message">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <form method="POST">
            <label>New Password</label>
            <div style="position:relative; margin-bottom:15px;">
                <input type="password" id="pw-new" name="password" placeholder="New password" required style="padding-right:42px; margin-bottom:0;">
                <button type="button" onclick="togglePw('pw-new',this)" tabindex="-1" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9d82c0;font-size:16px;line-height:1;padding:0;">👁</button>
            </div>

            <label>Confirm Password</label>
            <div style="position:relative; margin-bottom:15px;">
                <input type="password" id="pw-confirm" name="confirm_password" placeholder="Confirm new password" required style="padding-right:42px; margin-bottom:0;">
                <button type="button" onclick="togglePw('pw-confirm',this)" tabindex="-1" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9d82c0;font-size:16px;line-height:1;padding:0;">👁</button>
            </div>

            <button type="submit" class="primary-btn" style="width:100%; margin-top:8px;">Update Password 💖</button>
        </form>

        <div style="text-align:center; margin-top:18px;">
            <a href="/admin_login" class="btn-back">← Back to Admin Login</a>
        </div>
    </div>
</div>
<script>
function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
}
</script>
</body>
</html>
